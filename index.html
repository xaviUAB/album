<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Àlbum de Cromos: El Món de l'Animació</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Fredoka+One&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f3f4f6; }
        .book-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100vh; padding: 20px; display: none; }
        .page { background-color: #fdfdfd; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); overflow: hidden; border: solid 1px #e5e5e5; }
        .page-cover { background-color: #4f46e5; color: white; background-image: linear-gradient(135deg, #4f46e5 0%, #312e81 100%); }
        .page-content { padding: 24px; height: 100%; display: flex; flex-direction: column; }
        .cromo-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 16px; flex-grow: 1; margin-top: 10px; }
        .cromo-slot { aspect-ratio: 3/4; position: relative; border-radius: 6px; overflow: hidden; cursor: pointer; }
        .cromo-filled { background-color: white; border: 3px solid white; display: flex; align-items: center; justify-content: center; }
        .cromo-empty { background-color: #e5e7eb; border: 2px dashed #9ca3af; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: default; }
        .cromo-empty img { filter: grayscale(100%); opacity: 0.5; width: 100%; height: 100%; object-fit: cover; }
        #modal-overlay, #confirm-overlay, #trade-request-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full mx-4 border border-gray-100">
            <h1 class="text-3xl text-gray-800 mb-6 text-center">Àlbum d'Animació</h1>
            <form id="login-form" class="space-y-6">
                <input type="text" id="userCode" class="w-full px-4 py-3 rounded-lg border border-gray-300" placeholder="Codi d'usuari (NIU)" required>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg">Obrir</button>
            </form>
        </div>
    </div>

    <div id="album-view" class="book-container relative">
        <div class="absolute top-4 left-4 z-50 flex gap-2">
            <button id="btn-logout" class="bg-white px-4 py-2 rounded-lg shadow">Sortir</button>
            <button id="btn-market" class="bg-emerald-600 text-white px-4 py-2 rounded-lg shadow">Mercat</button>
        </div>
        <div id="book"></div>
    </div>

    <div id="market-view" class="hidden min-h-screen p-8 pt-24 max-w-6xl mx-auto w-full">
        <div class="flex justify-between mb-6">
            <h2 class="text-2xl font-bold">Mercat: Cromos repetits</h2>
            <button id="btn-back-album" class="bg-gray-500 text-white px-4 py-2 rounded-lg">Tornar</button>
        </div>
        <div id="market-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" onclick="tancarModal()"><img id="modal-img" class="max-w-[90%] max-h-[90%] object-contain" onclick="event.stopPropagation()"></div>
    <div id="confirm-overlay"><div class="bg-white p-6 rounded-lg text-center max-w-xs"><p id="confirm-text" class="mb-4">Sol·licitar?</p><button onclick="tancarConfirm()" class="px-4 py-2 bg-gray-300 rounded">No</button><button id="btn-confirm-yes" class="px-4 py-2 bg-green-600 text-white rounded">Sí</button></div></div>
    <div id="trade-request-overlay"><div class="bg-white p-6 rounded-lg max-w-lg w-full"><h2 class="text-xl font-bold mb-4" id="trade-title">Nova sol·licitud</h2><div id="trade-grid" class="grid grid-cols-3 gap-2"></div><button onclick="tancarTrade()" class="mt-4 w-full bg-red-500 text-white p-2 rounded">Tancar</button></div></div>

    <script>
        const BASE_IMAGE_URL = "https://xaviuab.github.io/album/animacio/cromos/";
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1HFUal7-fWHCIFZgdcMjgYVn0-g6CIskbnoo1c2nae_k/export?format=csv';
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxyOye5PYedv9aEubbS1YMawyioh3M6pcNnenIgCmakr7Qv01XciSLoT1ZIU5l_XWVQ/exec';

        let allUsersData = {}, currentUserId = null;

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('userCode').value.trim();
            const response = await fetch(GOOGLE_SHEET_CSV_URL);
            const csvText = await response.text();
            allUsersData = parseAllCSVData(csvText);
            if (allUsersData[code]) {
                currentUserId = code;
                iniciarAlbum(allUsersData[code]);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('album-view').style.display = 'flex';
            }
        });

        function parseAllCSVData(csvText) {
            const lines = csvText.split('\n');
            const db = {};
            for (let i = 1; i < lines.length; i++) {
                const row = lines[i].split(',').map(c => c.replace(/(^"|"$)/g, '').trim());
                if (!row[0]) continue;
                const stickers = {};
                for (let j = 1; j < row.length; j++) { if (parseInt(row[j]) > 0) stickers[j] = parseInt(row[j]); }
                db[row[0]] = stickers;
            }
            return db;
        }

        async function carregarMercat() {
            // Comprovar intercanvis pendents
            const tradeRes = await fetch(APPS_SCRIPT_URL + "?action=getTrades");
            const trades = await tradeRes.json();
            const pending = trades.find(t => t.propietari === currentUserId && t.estat === "Pendent");
            
            if (pending) {
                document.getElementById('trade-title').innerText = `Sol·licitud del cromo #${pending.cromo} de ${pending.sollicitant}`;
                const grid = document.getElementById('trade-grid');
                grid.innerHTML = '';
                const requesterStickers = allUsersData[pending.sollicitant] || {};
                
                Object.keys(requesterStickers).forEach(id => {
                    if (requesterStickers[id] > 1) {
                        const div = document.createElement('div');
                        const isMissing = !allUsersData[currentUserId][id];
                        div.className = `p-2 border ${isMissing ? 'bg-green-100' : 'bg-red-100'}`;
                        div.innerHTML = `<img src="${BASE_IMAGE_URL}${String(id).padStart(3, '0')}.jpg"> #${id}`;
                        if (isMissing) div.onclick = () => { if(confirm("Confirmar intercanvi?")) acceptarIntercanvi(pending.id, id); };
                        grid.appendChild(div);
                    }
                });
                document.getElementById('trade-request-overlay').style.display = 'flex';
            }

            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            for (const [userId, stickers] of Object.entries(allUsersData)) {
                if (userId === currentUserId) continue;
                for (const [id, qty] of Object.entries(stickers)) {
                    if (qty > 1) {
                        const card = document.createElement('div');
                        card.className = "bg-white p-2 rounded shadow cursor-pointer text-center";
                        card.innerHTML = `<img src="${BASE_IMAGE_URL}${String(id).padStart(3, '0')}.jpg" class="w-full h-40 object-contain">
                                          <p class="font-bold ${!allUsersData[currentUserId][id] ? 'text-green-600' : 'text-red-600'}">#${id}</p>`;
                        card.onclick = () => {
                            document.getElementById('confirm-overlay').style.display = 'flex';
                            document.getElementById('btn-confirm-yes').onclick = () => enviarSolicitud(userId, id);
                        };
                        grid.appendChild(card);
                    }
                }
            }
        }

        async function acceptarIntercanvi(tradeId, cromoOferit) {
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "acceptar", tradeId, cromoOferit}) });
            alert("Intercanvi realitzat!");
            location.reload();
        }

        async function enviarSolicitud(propietari, cromo) {
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "sol·licitar", propietari, sollicitant: currentUserId, cromo}) });
            alert("Petició enviada!");
            tancarConfirm();
        }

        function tancarConfirm() { document.getElementById('confirm-overlay').style.display = 'none'; }
        function tancarTrade() { document.getElementById('trade-request-overlay').style.display = 'none'; }
        function tancarModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        
        document.getElementById('btn-logout').onclick = () => location.reload();
        document.getElementById('btn-market').onclick = () => { document.getElementById('album-view').style.display = 'none'; document.getElementById('market-view').classList.remove('hidden'); carregarMercat(); };
        document.getElementById('btn-back-album').onclick = () => { document.getElementById('market-view').classList.add('hidden'); document.getElementById('album-view').style.display = 'flex'; };

        function iniciarAlbum(userStickers) {
            const bookEl = document.getElementById('book');
            bookEl.innerHTML = generarPagines(userStickers);
            const pageFlip = new St.PageFlip(bookEl, { width: 500, height: 720, size: "fixed", showCover: true, clickEventForward: false });
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
        }

        function generarPagines(userStickers) {
            let html = '<div class="page page-cover"><div class="page-content flex items-center justify-center text-white text-3xl font-bold">Àlbum</div></div>';
            for (let p = 0; p < 20; p++) {
                html += `<div class="page"><div class="page-content"><div class="cromo-grid">`;
                for (let i = 1; i <= 4; i++) {
                    let id = p * 4 + i;
                    let qty = userStickers[id] || 0;
                    let imgUrl = `${BASE_IMAGE_URL}${String(id).padStart(3, '0')}.jpg`;
                    if (qty > 0) {
                        html += `<div class="cromo-slot cromo-filled" onclick="obrirModal('${imgUrl}')"><img src="${imgUrl}" class="w-full h-full object-cover"></div>`;
                    } else {
                        html += `<div class="cromo-slot cromo-empty"><img src="${imgUrl}"><span class="absolute font-bold text-gray-400">#${id}</span></div>`;
                    }
                }
                html += `</div></div></div>`;
            }
            return html;
        }
    </script>
</body>
</html>
